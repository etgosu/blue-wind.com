<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <script>
    // Supabase redirects here after OAuth with tokens in the URL fragment/query
    // Forward to the app via custom URL scheme
    const hash = window.location.hash || '';
    const search = window.location.search || '';
    const appUrl = 'com.etgosu.babytemp://login-callback' + search + hash;
    window.location.href = appUrl;

    // Fallback: if app not installed, show message after 2s
    setTimeout(function() {
      document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px">앱으로 돌아가는 중... 앱이 열리지 않으면 앱을 먼저 설치해 주세요.</p>';
    }, 2000);
  </script>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px">앱으로 돌아가는 중...</p>
</body>
</html>
